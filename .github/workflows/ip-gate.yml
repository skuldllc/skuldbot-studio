name: ip-gate

on:
  workflow_call:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ip-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate proprietary LICENSE
        run: |
          test -f LICENSE
          grep -q "Skuld, LLC" LICENSE
          grep -q "Proprietary" LICENSE

      - name: Validate release workflow has cosign (if present)
        run: |
          if [ -f .github/workflows/release.yml ]; then
            grep -qi "cosign" .github/workflows/release.yml || {
              echo "release.yml must include cosign signing steps";
              exit 1;
            }
          fi

      - name: Validate changed file copyright headers
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="origin/${{ github.base_ref }}"
            git fetch origin "${{ github.base_ref }}" --depth=1
            CHANGED=$(git diff --name-only "$BASE_REF"...HEAD)
          else
            if git rev-parse HEAD~1 >/dev/null 2>&1; then
              CHANGED=$(git diff --name-only HEAD~1 HEAD)
            else
              CHANGED=$(git ls-files)
            fi
          fi

          if [ -z "$CHANGED" ]; then
            echo "No changed files to validate"
            exit 0
          fi

          python3 scripts/security/ensure_copyright_headers.py --check $CHANGED

      - name: Reject committed sourcemaps
        run: |
          if find . -type f -name "*.map" \
              -not -path "*/node_modules/*" \
              -not -path "*/.git/*" \
              | grep -q .; then
            echo "Committed sourcemap files are not allowed"
            find . -type f -name "*.map" \
              -not -path "*/node_modules/*" \
              -not -path "*/.git/*"
            exit 1
          fi

      - name: Reject mocks, test doubles, stubs (Python / TS / Rust)
        run: |
          set -euo pipefail
          VIOLATIONS=""
          scan() {
            local pattern="$1"
            local matches
            matches=$(grep -rEn "$pattern" \
              --include="*.py" --include="*.ts" --include="*.tsx" \
              --include="*.js" --include="*.jsx" --include="*.rs" \
              --exclude-dir=node_modules --exclude-dir=.venv --exclude-dir=.venv-spike312 \
              --exclude-dir=__pycache__ --exclude-dir=target --exclude-dir=dist \
              --exclude-dir=build --exclude-dir=.next --exclude-dir=.turbo \
              --exclude-dir=.git --exclude-dir=.github --exclude-dir=docs \
              . 2>/dev/null || true)
            if [ -n "$matches" ]; then
              VIOLATIONS="${VIOLATIONS}${matches}"$'\n'
            fi
          }
          # Python
          scan 'from[[:space:]]+unittest\.mock[[:space:]]+import'
          scan '^import[[:space:]]+unittest\.mock'
          scan '^import[[:space:]]+mock([[:space:]]|$)'
          scan '^from[[:space:]]+mock[[:space:]]+import'
          scan '\bMagicMock\(|\bAsyncMock\(|\bcreate_autospec\('
          scan '@patch\b|@patch\.object|@patch\.dict'
          scan '\bmocker\.(patch|Mock|MagicMock)'
          scan 'import[[:space:]]+pytest_mock|from[[:space:]]+pytest_mock'
          scan '^import[[:space:]]+responses\b'
          scan 'import[[:space:]]+requests_mock|from[[:space:]]+requests_mock'
          scan 'import[[:space:]]+(vcrpy|vcr)\b'
          scan '^import[[:space:]]+httpretty\b'
          scan '^import[[:space:]]+aioresponses\b'
          # TypeScript / JavaScript
          scan '\bjest\.(fn|mock|spyOn)\('
          scan '\bvi\.(fn|mock|spyOn)\('
          scan '\bsinon\.(stub|spy|mock)\('
          scan "require\(['\"]nock['\"]\\)|from[[:space:]]+['\"]nock['\"]"
          scan "require\(['\"]msw['\"]\\)|from[[:space:]]+['\"]msw['\"]"
          scan "require\(['\"]fetch-mock['\"]\\)|from[[:space:]]+['\"]fetch-mock['\"]"
          # Rust
          scan 'use[[:space:]]+mockall|#\[automock\]'
          scan 'use[[:space:]]+(mockito|wiremock)'
          if [ -n "$VIOLATIONS" ]; then
            echo "::error::Prohibited mock patterns detected — see POLICY_NO_MOCKS.md"
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "mock/test-double check PASS"

      - name: Reject mock dependencies in package manifests
        run: |
          set -euo pipefail
          BAD=""
          for f in requirements.txt pyproject.toml setup.py package.json Cargo.toml; do
            [ -f "$f" ] || continue
            if grep -iE '^\s*"?(mock|pytest-mock|responses|requests-mock|vcrpy|httpretty|aioresponses|nock|msw|fetch-mock|sinon|mockall|mockito|wiremock)"?[[:space:]]*[=:><]' "$f" >/dev/null 2>&1; then
              BAD="${BAD}${f}:"$'\n'$(grep -inE '(^|[[:space:]"])("|)(mock|pytest-mock|responses|requests-mock|vcrpy|httpretty|aioresponses|nock|msw|fetch-mock|sinon|mockall|mockito|wiremock)("|)[[:space:]]*[=:><]' "$f" | head -5)$'\n'
            fi
          done
          if [ -n "$BAD" ]; then
            echo "::error::Prohibited mock dependency in manifest — see POLICY_NO_MOCKS.md"
            echo "$BAD"
            exit 1
          fi
          echo "mock-dependency check PASS"
