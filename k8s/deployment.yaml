apiVersion: v1
kind: Namespace
metadata:
  name: skuldbot
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: skuldbot-config
  namespace: skuldbot
data:
  config.yaml: |
    server:
      name: "skuldbot-studio"
      version: "1.0.0"
      environment: "production"
      api_version: "v1"
      shutdown_timeout_secs: 30
    
    mcp:
      enabled: true
      request_timeout_secs: 300
      max_concurrent_requests: 100
      servers:
        - name: "compliance"
          server_type: "compliance"
          enabled: true
    
    database:
      db_type: "postgres"
      url: "postgresql://skuldbot:password@postgres:5432/skuldbot"
      pool_size: 20
      connection_timeout_secs: 30
      auto_migrate: true
    
    observability:
      logging:
        level: "info"
        format: "json"
      metrics:
        enabled: true
        endpoint: "/metrics"
        port: 9090
    
    security:
      secrets_backend: "env"
      encryption_at_rest: true
    
    tenants:
      - id: "default"
        name: "Default Tenant"
        enabled: true
        compliance_policy:
          phi_provider: "azure_openai"
          phi_model: "gpt-4o"
          audit_retention_days: 2555
---
apiVersion: v1
kind: Service
metadata:
  name: skuldbot-studio
  namespace: skuldbot
  labels:
    app: skuldbot-studio
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
  selector:
    app: skuldbot-studio
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: skuldbot-studio
  namespace: skuldbot
  labels:
    app: skuldbot-studio
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: skuldbot-studio
  template:
    metadata:
      labels:
        app: skuldbot-studio
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: skuldbot-studio
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: skuldbot-studio
          image: ghcr.io/khipus/skuldbot-studio:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
          env:
            - name: RUST_LOG
              value: "info"
            - name: SKULDBOT__SERVER__ENVIRONMENT
              value: "production"
            - name: SKULDBOT__DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: skuldbot-secrets
                  key: database-url
          volumeMounts:
            - name: config
              mountPath: /app/config
              readOnly: true
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health/startup
              port: 9090
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 30
      volumes:
        - name: config
          configMap:
            name: skuldbot-config
        - name: data
          persistentVolumeClaim:
            claimName: skuldbot-data
        - name: logs
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: skuldbot-studio
  namespace: skuldbot
---
apiVersion: v1
kind: Secret
metadata:
  name: skuldbot-secrets
  namespace: skuldbot
type: Opaque
stringData:
  database-url: "postgresql://skuldbot:REPLACE_WITH_ACTUAL_PASSWORD@postgres:5432/skuldbot"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: skuldbot-data
  namespace: skuldbot
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: skuldbot-studio-pdb
  namespace: skuldbot
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: skuldbot-studio
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: skuldbot-studio-hpa
  namespace: skuldbot
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: skuldbot-studio
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

