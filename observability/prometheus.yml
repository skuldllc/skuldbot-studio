# Prometheus configuration for SkuldBot Studio
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'skuldbot-production'
    replica: '1'

scrape_configs:
  - job_name: 'skuldbot-studio'
    static_configs:
      - targets: ['skuldbot:9090']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

