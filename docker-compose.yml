# Docker Compose for local development and testing
version: '3.8'

services:
  # SkuldBot Studio
  skuldbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skuldbot-studio
    ports:
      - "9090:9090"  # Prometheus metrics
    volumes:
      - ./config.yaml:/app/config/config.yaml:ro
      - skuldbot-data:/app/data
      - skuldbot-logs:/app/logs
    environment:
      - RUST_LOG=info
      - SKULDBOT__SERVER__ENVIRONMENT=development
      - SKULDBOT__DATABASE__URL=sqlite:///app/data/skuldbot.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health/ready"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    restart: unless-stopped
  
  # PostgreSQL (optional, for production)
  postgres:
    image: postgres:16-alpine
    container_name: skuldbot-postgres
    environment:
      - POSTGRES_USER=skuldbot
      - POSTGRES_PASSWORD=skuldbot_password
      - POSTGRES_DB=skuldbot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skuldbot"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  
  # Prometheus (metrics)
  prometheus:
    image: prom/prometheus:latest
    container_name: skuldbot-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    restart: unless-stopped
  
  # Grafana (dashboards)
  grafana:
    image: grafana/grafana:latest
    container_name: skuldbot-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana-dashboards:/etc/grafana/provisioning/dashboards
      - ./observability/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  skuldbot-data:
  skuldbot-logs:
  postgres-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: skuldbot-network

